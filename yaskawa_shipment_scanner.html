<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="출하 스캐너">
<title>YASKAWA 출하 스캐너</title>
<script src="zxing-bundle.js" onload="window._zxingLoaded=true" onerror="window._zxingLoaded=false"></script>
<style>
:root{
  --bg:#f5f5f3;--sf:#fff;--sf2:#efefed;--bd:rgba(0,0,0,.10);--bdm:rgba(0,0,0,.18);
  --tx:#1a1a1a;--t2:#666;--t3:#999;
  --blue:#1a6fc4;--blueb:#e8f2fc;
  --green:#1e7e3c;--greenb:#e6f5ec;
  --red:#c0392b;--redb:#fdecea;
  --r:10px;--rs:7px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111;--sf:#1e1e1e;--sf2:#2a2a2a;--bd:rgba(255,255,255,.10);--bdm:rgba(255,255,255,.18);
  --tx:#f0f0f0;--t2:#aaa;--t3:#666;
  --blue:#5aabf7;--blueb:#0d2a45;--green:#4ecb71;--greenb:#0d2e1a;
  --red:#f47c72;--redb:#2e0d0a;
}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;color:var(--tx);overflow-x:hidden}
.page{display:none}.page.active{display:block}
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:var(--sf);
  border-top:.5px solid var(--bd);display:flex;max-width:480px;margin:0 auto;
  padding-bottom:env(safe-area-inset-bottom)}
.tbtab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 4px 6px;gap:3px;border:none;background:transparent;cursor:pointer;color:var(--t3)}
.tbtab.on{color:var(--blue)}
.tbtab svg{width:22px;height:22px}
.tbtab span{font-size:10px;font-weight:600}

/* ── 스캔 페이지 ── */
#page-scan{position:relative;height:100dvh;height:100vh;background:#000;overflow:hidden}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
.scan-ui{position:absolute;inset:0;display:flex;flex-direction:column;pointer-events:none}
.scan-top{flex:0 0 20%;background:rgba(0,0,0,.5)}
.scan-mid{display:flex;flex:0 0 40%}
.scan-side{width:4%;background:rgba(0,0,0,.5)}
.scan-window{flex:1;position:relative;overflow:hidden}
.label-frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.label-box{width:93%;background:rgba(0,0,0,.6);border:1.5px solid rgba(255,255,255,.2);
  border-radius:8px;overflow:hidden;backdrop-filter:blur(2px)}
.lf-row{display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,.1)}
.lf-row:last-child{border-bottom:none}
.lf-tag{font-size:10px;font-weight:700;padding:7px 8px;white-space:nowrap;
  flex-shrink:0;min-width:46px;text-align:center;border-right:1px solid rgba(255,255,255,.1)}
.lf-row.wait .lf-tag{background:rgba(239,68,68,.5);color:#fff}
.lf-row.done .lf-tag{background:rgba(74,222,128,.55);color:#fff}
.lf-val{font-size:10px;font-family:'Courier New',monospace;padding:7px 8px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.lf-row.wait .lf-val{color:rgba(255,255,255,.4)}
.lf-row.done .lf-val{color:#fff;font-weight:600}
.lf-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-right:8px}
.lf-row.wait .lf-dot{background:rgba(239,68,68,.8)}
.lf-row.done .lf-dot{background:#4ade80}
.scan-beam{position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);
  pointer-events:none;z-index:2;animation:beam 1.8s ease-in-out infinite}
@keyframes beam{0%,100%{top:2%}50%{top:95%}}
.scan-bot{flex:1;background:rgba(0,0,0,.5);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;padding:12px 20px;pointer-events:none}
.scan-status{font-size:13px;color:rgba(255,255,255,.85);font-weight:600;text-align:center;line-height:1.4}
.scan-status.ok{color:#4ade80}
.scan-status.err{color:#f87171}
.cam-side-btns{position:absolute;top:16px;right:14px;display:flex;flex-direction:column;gap:10px;pointer-events:all}
.cam-ico{width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.55);
  border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cam-ico svg{width:20px;height:20px}
.cam-ico.lit{color:#fbbf24}
.engine-badge{position:absolute;top:14px;left:14px;font-size:11px;padding:4px 10px;
  border-radius:20px;font-weight:700;pointer-events:none}
.eb-loading{background:rgba(251,191,36,.25);color:#fbbf24;border:1px solid rgba(251,191,36,.4)}
.eb-ready{background:rgba(74,222,128,.2);color:#4ade80;border:1px solid rgba(74,222,128,.35)}
.eb-error{background:rgba(248,113,113,.2);color:#f87171;border:1px solid rgba(248,113,113,.35)}
.start-ov{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;background:rgba(0,0,0,.72)}
.start-btn{padding:14px 32px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.6);
  color:#fff;border-radius:var(--r);font-size:16px;cursor:pointer;
  display:flex;align-items:center;gap:10px;font-weight:700;pointer-events:all}
.start-note{font-size:13px;color:rgba(255,255,255,.55);text-align:center;padding:0 24px;line-height:1.55}
.fb{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .1s}
.fb.ok{background:rgba(34,197,94,.3)}.fb.err{background:rgba(220,53,53,.4)}.fb.on{opacity:1}

/* ── 목록 페이지 ── */
#page-list{
  display:none;
  flex-direction:column;
  min-height:100vh;
  padding-bottom:calc(62px + env(safe-area-inset-bottom));
}
#page-list.active{display:flex}
.list-hdr{display:flex;align-items:center;justify-content:space-between;
  padding:13px 16px 10px;border-bottom:.5px solid var(--bd);
  background:var(--sf);position:sticky;top:0;z-index:10;flex-shrink:0}
.list-hdr h1{font-size:17px;font-weight:700}
.clr-btn{font-size:12px;color:var(--red);background:none;border:.5px solid var(--red);
  padding:3px 11px;border-radius:20px;cursor:pointer}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:10px 12px;flex-shrink:0}
.stat{background:var(--sf);border:.5px solid var(--bd);border-radius:var(--r);padding:8px;text-align:center}
.stat-n{font-size:22px;font-weight:700}.stat-n.red{color:var(--red)}
.stat-l{font-size:10px;color:var(--t2);margin-top:1px}
.manual{display:flex;gap:6px;padding:0 12px 10px;flex-shrink:0}
.manual input{flex:1;padding:8px 10px;font-size:13px;border:.5px solid var(--bdm);
  border-radius:var(--rs);background:var(--sf);color:var(--tx);outline:none}
.manual input:focus{border-color:var(--blue)}
.manual button{padding:8px 12px;font-size:12px;font-weight:700;border:.5px solid var(--bdm);
  border-radius:var(--rs);background:var(--sf);color:var(--tx);cursor:pointer;white-space:nowrap}
/* 테이블 — 스크롤 가능하도록 */
.tbl-wrap{flex:1;overflow:auto;padding:0 12px 12px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl thead{position:sticky;top:0;z-index:5}
.tbl thead tr{background:var(--sf2)}
.tbl th{padding:8px 10px;text-align:left;font-weight:700;font-size:11px;
  color:var(--t2);border:.5px solid var(--bd);white-space:nowrap}
.tbl td{padding:8px 10px;border:.5px solid var(--bd);color:var(--tx);vertical-align:middle}
.tbl tbody tr:hover{background:var(--sf2)}
.tbl tbody tr:nth-child(even){background:rgba(0,0,0,.02)}
@media(prefers-color-scheme:dark){.tbl tbody tr:nth-child(even){background:rgba(255,255,255,.02)}}
.tbl-num{color:var(--t3);font-size:11px;text-align:center;width:32px}
.tbl-model{font-family:'Courier New',monospace;font-weight:700;font-size:11px;white-space:nowrap}
.tbl-sn{font-family:'Courier New',monospace;font-size:11px}
.tbl-time{font-size:10px;color:var(--t2);white-space:nowrap}
.st-ok{color:var(--green);font-weight:700;font-size:13px}
.st-partial{color:#a05c00;font-weight:700;font-size:13px}
.del-row{background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;
  padding:0 4px;line-height:1;display:block;margin:0 auto}
.empty-st{text-align:center;padding:3rem 1rem;color:var(--t3);font-size:13px;line-height:1.9}
.empty-st svg{width:40px;height:40px;opacity:.3;display:block;margin:0 auto 10px}

/* ── 내보내기 페이지 ── */
#page-export{padding:14px 16px;padding-bottom:calc(80px + env(safe-area-inset-bottom));min-height:100vh}
#page-export h2{font-size:16px;font-weight:700;margin-bottom:14px}
.exp-btn{width:100%;padding:14px;font-size:14px;font-weight:700;border-radius:var(--r);
  cursor:pointer;display:flex;align-items:center;gap:10px;
  border:.5px solid var(--bdm);background:var(--sf);color:var(--tx);margin-bottom:10px}
.exp-btn svg{width:20px;height:20px;flex-shrink:0}
.exp-btn:active{opacity:.7}
.exp-btn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.exp-btn.green-btn{background:var(--green);color:#fff;border-color:var(--green)}
.sec-lbl{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.04em;margin:18px 0 8px}
.flbl{display:block;font-size:11px;font-weight:700;color:var(--t2);margin:10px 0 4px;text-transform:uppercase;letter-spacing:.04em}
.finp{width:100%;padding:10px 12px;font-size:14px;border:.5px solid var(--bdm);
  border-radius:var(--rs);background:var(--sf2);color:var(--tx);outline:none;font-family:inherit}
.finp:focus{border-color:var(--blue)}
textarea.finp{resize:none;height:70px}
.fnote{font-size:12px;color:var(--t3);margin-top:8px;line-height:1.55}

/* 중복 모달 */
.dup-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;align-items:center;justify-content:center}
.dup-ov.open{display:flex}
.dup-box{background:var(--sf);border-radius:20px;padding:2rem 1.5rem 1.5rem;width:88%;max-width:340px;text-align:center}
.dup-ico{width:60px;height:60px;border-radius:50%;background:var(--redb);display:flex;align-items:center;justify-content:center;margin:0 auto 12px}
.dup-ico svg{width:30px;height:30px;color:var(--red)}
.dup-box h2{font-size:17px;font-weight:700;margin-bottom:6px}
.dup-box p{font-size:13px;color:var(--t2);margin-bottom:12px;line-height:1.5}
.dup-card{background:var(--sf2);border-radius:var(--rs);padding:10px 14px;text-align:left;margin-bottom:4px}
.dup-code-lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;margin-bottom:3px}
.dup-code-val{font-size:13px;font-family:'Courier New',monospace;font-weight:700;color:var(--red);word-break:break-all}
.dup-ok{width:100%;padding:12px;border-radius:var(--rs);font-size:15px;font-weight:700;cursor:pointer;border:none;background:var(--red);color:#fff;margin-top:10px}
.toast{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
  background:rgba(20,20,20,.92);color:#fff;padding:10px 20px;border-radius:24px;
  font-size:13px;font-weight:500;z-index:400;opacity:0;transition:opacity .22s;
  pointer-events:none;white-space:nowrap;max-width:92vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- ══ 스캔 페이지 ══ -->
<div id="page-scan" class="page active">
  <video id="video" autoplay playsinline muted></video>
  <div class="scan-ui">
    <div class="scan-top"></div>
    <div class="scan-mid">
      <div class="scan-side"></div>
      <div class="scan-window">
        <div class="label-frame">
          <div class="label-box">
            <div class="lf-row wait" id="lf-model">
              <span class="lf-tag">모델명</span>
              <span class="lf-val" id="lf-val-model">대기중...</span>
              <span class="lf-dot"></span>
            </div>
            <div class="lf-row wait" id="lf-serial">
              <span class="lf-tag">S/N</span>
              <span class="lf-val" id="lf-val-serial">대기중...</span>
              <span class="lf-dot"></span>
            </div>
          </div>
        </div>
        <div class="scan-beam"></div>
      </div>
      <div class="scan-side"></div>
    </div>
    <div class="scan-bot">
      <div class="scan-status" id="scan-status">라벨을 프레임 안에 맞춰주세요</div>
    </div>
  </div>
  <div class="engine-badge eb-loading" id="eng-badge">준비 중...</div>
  <div class="cam-side-btns">
    <button class="cam-ico" id="torch-btn" onclick="toggleTorch()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
    </button>
    <button class="cam-ico" onclick="flipCam()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10"/><path d="M3.51 15a9 9 0 0 0 14.85 3.36L23 14"/></svg>
    </button>
  </div>
  <div class="start-ov" id="start-ov">
    <button class="start-btn" onclick="initAudio();startCam()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
      카메라 시작
    </button>
    <div class="start-note" id="start-note">카메라 권한이 필요합니다</div>
  </div>
  <div class="fb" id="fb"></div>
</div>

<!-- ══ 목록 페이지 ══ -->
<div id="page-list" class="page">
  <div class="list-hdr">
    <h1>스캔 목록</h1>
    <button class="clr-btn" onclick="clearAll()">전체 삭제</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s0">0</div><div class="stat-l">등록 품목</div></div>
    <div class="stat"><div class="stat-n red" id="s1">0</div><div class="stat-l">중복 차단</div></div>
  </div>
  <div class="manual">
    <input type="text" id="min" placeholder="바코드 직접 입력 후 Enter">
    <button onclick="addManual()">+ 추가</button>
  </div>
  <div class="tbl-wrap" id="tbl-wrap">
    <div class="empty-st" id="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      스캔된 항목이 없습니다<br>카메라 탭에서 바코드를 스캔하세요
    </div>
  </div>
</div>

<!-- ══ 내보내기 페이지 ══ -->
<div id="page-export" class="page">
  <h2>내보내기</h2>
  <button class="exp-btn primary" onclick="dlXLSX()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
    엑셀(.xlsx) 다운로드
  </button>
  <button class="exp-btn" onclick="dlCSV()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    CSV 다운로드
  </button>
  <div class="sec-lbl">이메일 전송</div>
  <label class="flbl">받는 사람</label>
  <input class="finp" type="email" id="eto" placeholder="example@company.com">
  <label class="flbl">제목</label>
  <input class="finp" type="text" id="esubj">
  <label class="flbl">메모 (선택)</label>
  <textarea class="finp" id="enote" placeholder="추가 메모..."></textarea>
  <button class="exp-btn primary" style="margin-top:12px" onclick="sendEmail()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
    메일 앱 열기
  </button>
  <p class="fnote">※ 기기의 메일 앱이 열리며 CSV 데이터가 본문에 포함됩니다.</p>
  <div class="sec-lbl" style="margin-top:18px">Google Sheets</div>
  <label class="flbl">Apps Script 웹훅 URL</label>
  <input class="finp" type="url" id="surl" placeholder="https://script.google.com/macros/s/...">
  <button class="exp-btn green-btn" style="margin-top:10px" onclick="sendSheets()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
    Google Sheets 전송
  </button>
</div>

<!-- 탭바 -->
<div class="tabbar">
  <button class="tbtab on" id="tb0" onclick="goPage(0)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
    <span>스캔</span>
  </button>
  <button class="tbtab" id="tb1" onclick="goPage(1)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span id="tb1-lbl">목록 (0)</span>
  </button>
  <button class="tbtab" id="tb2" onclick="goPage(2)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    <span>내보내기</span>
  </button>
</div>

<!-- 중복 모달 -->
<div class="dup-ov" id="dup-ov">
  <div class="dup-box">
    <div class="dup-ico">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    </div>
    <h2>이미 리스트업 된 제품입니다</h2>
    <p>동일한 시리얼번호가 이미 등록되어<br>있습니다. 추가되지 않았습니다.</p>
    <div class="dup-card">
      <div class="dup-code-lbl">시리얼번호 (S/N)</div>
      <div class="dup-code-val" id="dup-code"></div>
    </div>
    <button class="dup-ok" onclick="closeDup()">확인</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
// ══ 상태 ══
const groups = [];
let torchOn = false;
let lastCodes = new Map();
let totalScans = 0, blocked = 0;
let engineReady = false, useNative = false, nativeDet = null;
let scanRunning = false, scanCanvas = null, scanCtx = null;
let currentStream = null, facingMode = 'environment';

// 버퍼: 모델명 + S/N 만
let buf = { model:null, serial:null };
let bufStartTime = 0;
const BUF_MAX_MS = 4000; // 4초 내 코드들만 같은 라벨로 묶음

// ══ 삑 소리 (Web Audio API - iOS 호환) ══
let _audioCtx = null;
// 반드시 사용자 동작(버튼 클릭) 안에서 호출
function initAudio() {
  try {
    if (!_audioCtx) {
      _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
  } catch(e) {}
}
function beep() {
  try {
    if (!_audioCtx) return;
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    const osc  = _audioCtx.createOscillator();
    const gain = _audioCtx.createGain();
    osc.connect(gain);
    gain.connect(_audioCtx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1800, _audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(900, _audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.6, _audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, _audioCtx.currentTime + 0.15);
    osc.start(_audioCtx.currentTime);
    osc.stop(_audioCtx.currentTime + 0.15);
  } catch(e) { console.log('beep error:', e); }
}

// ══ 페이지 전환 ══
function goPage(n) {
  document.querySelectorAll('.page').forEach((p,i) => p.classList.toggle('active', i===n));
  document.querySelectorAll('.tbtab').forEach((t,i) => t.classList.toggle('on', i===n));
  if (n===2) {
    const d = new Date();
    document.getElementById('esubj').value = `출하 목록 ${d.toLocaleDateString('ko-KR')} (${groups.length}건)`;
  }
}

// ══ 코드 전처리 ══
function preprocess(raw) {
  let c = raw.trim();
  // S/N 끝 체크문자 제거
  const snMatch = c.match(/^([A-Z]{1,2}[0-9]{3,4}[A-Z]{1,2}[0-9]{8,})[A-Z]$/);
  if (snMatch) c = snMatch[1];
  // S/N 최대 15자리 (앞에서 15자만 사용)
  if (/^[A-Z]{1,2}[0-9]{3,4}[A-Z]{1,2}[0-9]{8,}$/.test(c) && c.length > 15) {
    c = c.substring(0, 15);
  }
  // 모델명 끝 C 제거 (히든 체크문자)
  if (/^SG[DM][A-Z0-9].*[A-Z0-9]C$/.test(c) && c.length > 8) return c.slice(0, -1);
  return c;
}

// ══ 코드 분류 (모델명 + S/N 만) ══
function classify(raw) {
  // QR·O/N 완전 무시
  if (!raw || raw.includes(',') || raw.startsWith('http') || raw.length > 50) return 'ignore';

  // S/N 접두어
  if (/^S\/N\s*:/i.test(raw)) {
    const val = preprocess(raw.replace(/^S\/N\s*:\s*/i,'').trim());
    return val ? {type:'serial', val} : 'ignore';
  }
  // O/N 접두어 → 무시
  if (/^O\/N\s*:/i.test(raw)) return 'ignore';

  const c = preprocess(raw.trim());
  if (!c) return 'ignore';

  // ── 모델명 최우선 판별 ──
  // YASKAWA 모델명은 반드시 SG로 시작
  if (/^SGD7[SW]-[A-Z0-9]/i.test(c)) return {type:'model', val:c};
  if (/^SGDV-[A-Z0-9]/i.test(c))      return {type:'model', val:c};
  if (/^SGDS-[A-Z0-9]/i.test(c))      return {type:'model', val:c};
  if (/^SGM7[A-Z]-[A-Z0-9]/i.test(c)) return {type:'model', val:c};
  if (/^SGMJV-|^SGMAV-|^SGMPS-/i.test(c)) return {type:'model', val:c};
  if (/^SGM[A-Z]{1,2}[0-9]-[A-Z0-9]/i.test(c)) return {type:'model', val:c};

  // ── S/N 판별 ──
  // 패턴: 알파벳1~2 + 숫자3~4 + 알파벳1~2 + 숫자8이상 (총 14~18자)
  if (/^[A-Z]{1,2}[0-9]{3,4}[A-Z]{1,2}[0-9]{8,}$/.test(c) && c.length >= 14) {
    return {type:'serial', val:c};
  }

  return 'ignore';
}

// ══ 오버레이 UI ══
function updateOverlay() {
  ['model','serial'].forEach(k => {
    const val = buf[k];
    const row = document.getElementById('lf-'+k);
    const valEl = document.getElementById('lf-val-'+k);
    if (val) {
      row.className = 'lf-row done';
      valEl.textContent = val.length > 22 ? val.substring(0,20)+'…' : val;
    } else {
      row.className = 'lf-row wait';
      valEl.textContent = '대기중...';
    }
  });
}

function resetOverlay() {
  buf = {model:null, serial:null};
  bufStartTime = 0;
  updateOverlay();
  setScanStatus('라벨을 프레임 안에 맞춰주세요', '');
}

function setScanStatus(msg, cls) {
  const el = document.getElementById('scan-status');
  el.textContent = msg;
  el.className = 'scan-status' + (cls ? ' '+cls : '');
}

// ══ 핵심: 코드 수집 → 2개 완성 시 자동 등록 ══
function feedCode(raw) {
  const now = Date.now();
  const result = classify(raw);
  if (result === 'ignore') return;
  const {type, val} = result;

  // 같은 코드 2초 내 중복 무시
  const lastSeen = lastCodes.get(val) || 0;
  if (now - lastSeen < 2000) return;
  lastCodes.set(val, now);

  // 버퍼가 오래됐으면 리셋
  if (bufStartTime > 0 && now - bufStartTime > BUF_MAX_MS) {
    resetOverlay();
  }

  // S/N 중복 체크
  if (type === 'serial' && groups.some(g => g.serial === val)) {
    blocked++;
    updateStats();
    flash('err');
    showDup(val);
    return;
  }

  // 버퍼에 추가
  let added = false;
  if (type === 'model'  && !buf.model)  { buf.model  = val; added = true; }
  if (type === 'serial' && !buf.serial) { buf.serial = val; added = true; }
  if (!added) return;

  if (!bufStartTime) bufStartTime = now;
  updateOverlay();

  const cnt = [buf.model, buf.serial].filter(Boolean).length;
  const mTxt = buf.model  ? '모델명✓' : '모델명…';
  const sTxt = buf.serial ? 'S/N✓'   : 'S/N…';
  setScanStatus(`${mTxt}   ${sTxt}   (${cnt}/2)`, cnt === 2 ? 'ok' : '');

  // 2개 완성 → 등록
  if (buf.model && buf.serial) {
    setTimeout(registerGroup, 300);
  }
}

function registerGroup() {
  if (!buf.model || !buf.serial) return;
  if (groups.some(g => g.serial === buf.serial)) {
    flash('err');
    showDup(buf.serial);
    resetOverlay();
    return;
  }
  const g = {
    id:     Date.now(),
    model:  buf.model,
    serial: buf.serial,
    time:   new Date().toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit', second:'2-digit'})
  };
  groups.push(g);
  beep();
  flash('ok');
  updateStats();
  renderTable();
  setScanStatus('✓ 등록 완료! 다음 라벨을 스캔하세요', 'ok');
  setTimeout(resetOverlay, 2500);
}

// ══ 수동 입력 ══
function addManual() {
  const v = document.getElementById('min').value.trim();
  if (!v) return;
  feedCode(v);
  document.getElementById('min').value = '';
}

// ══ 엔진 초기화 ══
function setBadge(msg, cls) {
  const el = document.getElementById('eng-badge');
  el.textContent = msg; el.className = 'engine-badge ' + cls;
}

async function initEngine() {
  setBadge('준비 중...', 'eb-loading');
  if ('BarcodeDetector' in window) {
    try {
      // 모델명은 Code128, S/N도 Code128 — 가장 빠른 포맷만 지정
      const fmts = ['code_128', 'code_39', 'ean_13', 'ean_8', 'data_matrix', 'code_93'];
      nativeDet = new BarcodeDetector({formats: fmts});
      const c = document.createElement('canvas'); c.width=2; c.height=2;
      await nativeDet.detect(c);
      useNative = true; engineReady = true;
      setBadge('✓ 네이티브 스캐너', 'eb-ready');
      return;
    } catch(e) { nativeDet = null; }
  }
  if (typeof ZXingBrowser !== 'undefined') {
    useNative = false; engineReady = true;
    setBadge('✓ ZXing 스캐너', 'eb-ready');
    return;
  }
  const cdns = [
    'https://cdn.jsdelivr.net/npm/@zxing/browser@0.1.4/umd/index.min.js',
    'https://unpkg.com/@zxing/browser@0.1.4/umd/index.min.js'
  ];
  for (const url of cdns) {
    try {
      await new Promise((res,rej) => {
        const s = document.createElement('script');
        const t = setTimeout(() => rej(), 6000);
        s.onload = () => { clearTimeout(t); setTimeout(res, 200); };
        s.onerror = () => { clearTimeout(t); rej(); };
        s.src = url; document.head.appendChild(s);
      });
      if (typeof ZXingBrowser !== 'undefined') {
        useNative = false; engineReady = true;
        setBadge('✓ ZXing 스캐너', 'eb-ready'); return;
      }
    } catch(e) {}
  }
  setBadge('직접 입력 모드', 'eb-error');
}

// ══ 카메라 + 스캔 루프 ══
async function startCam() {
  document.getElementById('start-ov').style.display = 'none';
  try {
    if (currentStream) currentStream.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {facingMode:{ideal:facingMode}, width:{ideal:1920}, height:{ideal:1080}}
    });
    currentStream = stream;
    const v = document.getElementById('video');
    v.srcObject = stream;
    v.onloadedmetadata = async () => {
      try { await v.play(); } catch(e) {}
      startLoop(v);
    };
  } catch(e) {
    document.getElementById('start-ov').style.display = 'flex';
    setBadge('카메라 권한 필요', 'eb-error');
  }
}

// 위치 기반 스캔 — 라벨 구조에 맞게 프레임을 3분할
// 모델명: 상단 40%, S/N: 하단 40% (가운데는 O/N이지만 무시)
// 분할 캔버스를 각각 디코딩하면 원하는 바코드만 집중해서 인식
let zoneCanvas = null, zoneCtx = null;

function startLoop(video) {
  scanRunning = true;
  if (!scanCanvas) {
    scanCanvas = document.createElement('canvas');
    scanCtx = scanCanvas.getContext('2d', {willReadFrequently:true});
  }
  if (!zoneCanvas) {
    zoneCanvas = document.createElement('canvas');
    zoneCtx = zoneCanvas.getContext('2d', {willReadFrequently:true});
  }

  if (useNative && nativeDet) {
    (async function loop() {
      if (!scanRunning) return;
      if (video.readyState >= video.HAVE_ENOUGH_DATA && video.videoWidth > 0) {
        const W = video.videoWidth;
        const H = video.videoHeight;

        // ── 전체 프레임 스캔 ──
        scanCanvas.width = W; scanCanvas.height = H;
        scanCtx.drawImage(video, 0, 0);
        const fullResults = await nativeDet.detect(scanCanvas).catch(() => []);
        fullResults.forEach(r => { if (r.rawValue) feedCode(r.rawValue); });

        // ── 위치 기반 보완 스캔 (필요한 코드만 집중) ──
        // 현재 버퍼 상태에 따라 필요한 영역만 추가 스캔
        if (!buf.model) {
          // 모델명 없음 → 상단 45% 확대 스캔
          await scanZone(video, W, H, 0, 0, W, H * 0.45);
        }
        if (!buf.serial) {
          // S/N 없음 → 하단 40% 확대 스캔
          await scanZone(video, W, H, 0, H * 0.55, W, H * 0.45);
        }
      }
      setTimeout(() => { if (scanRunning) requestAnimationFrame(loop); }, 200);
    })();

  } else if (typeof ZXingBrowser !== 'undefined') {
    // ZXing은 단일 스캔만 가능 — 전체 프레임 사용
    try {
      const reader = new ZXingBrowser.BrowserMultiFormatReader();
      reader.decodeFromVideoElement(video, (result) => {
        if (result) feedCode(result.getText());
      });
    } catch(e) { setBadge('ZXing 오류', 'eb-error'); }
  }
}

// 특정 영역만 잘라서 스캔
async function scanZone(video, fullW, fullH, sx, sy, sw, sh) {
  try {
    // 잘라낸 영역을 2배 확대해서 캔버스에 그림 (인식률 향상)
    const scale = 2;
    zoneCanvas.width  = sw * scale;
    zoneCanvas.height = sh * scale;
    zoneCtx.drawImage(video, sx, sy, sw, sh, 0, 0, sw * scale, sh * scale);
    const results = await nativeDet.detect(zoneCanvas).catch(() => []);
    results.forEach(r => { if (r.rawValue) feedCode(r.rawValue); });
  } catch(e) {}
}

function flipCam() {
  scanRunning = false;
  if (currentStream) currentStream.getTracks().forEach(t => t.stop());
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  setTimeout(startCam, 300);
}

async function toggleTorch() {
  if (!currentStream) return;
  const track = currentStream.getVideoTracks()[0];
  try {
    torchOn = !torchOn;
    await track.applyConstraints({advanced: [{torch: torchOn}]});
    document.getElementById('torch-btn').classList.toggle('lit', torchOn);
  } catch(e) { showToast('플래시 미지원'); torchOn = false; }
}

// ══ UI ══
function flash(type) {
  const el = document.getElementById('fb');
  el.className = 'fb ' + type + ' on';
  setTimeout(() => el.classList.remove('on'), 200);
}

function updateStats() {
  document.getElementById('s0').textContent = groups.length;
  document.getElementById('s1').textContent = blocked;
  document.getElementById('tb1-lbl').textContent = '목록 (' + groups.length + ')';
}

// ══ 테이블 렌더링 ══
function renderTable() {
  const wrap = document.getElementById('tbl-wrap');

  if (!groups.length) {
    wrap.innerHTML = '';
    const emp = document.getElementById('empty') || (() => {
      const d = document.createElement('div');
      d.id = 'empty'; d.className = 'empty-st';
      d.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/><line x1="9" y1="15" x2="15" y2="15"/></svg>스캔된 항목이 없습니다<br>카메라 탭에서 바코드를 스캔하세요';
      return d;
    })();
    wrap.appendChild(emp);
    return;
  }

  const rows = groups.map((g, i) => `<tr>
    <td class="tbl-num">${i+1}</td>
    <td class="tbl-model">${g.model||'—'}</td>
    <td class="tbl-sn">${g.serial||'—'}</td>
    <td class="tbl-time">${g.time}</td>
    <td><button class="del-row" onclick="removeGroup(${i})" aria-label="삭제">×</button></td>
  </tr>`).join('');

  wrap.innerHTML = `<table class="tbl">
    <thead><tr>
      <th>#</th>
      <th>모델명</th>
      <th>시리얼번호 (S/N)</th>
      <th>시간</th>
      <th></th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function removeGroup(i) {
  groups.splice(i, 1);
  updateStats();
  renderTable();
}

function clearAll() {
  if (!groups.length) return;
  if (!confirm('전체 목록을 삭제할까요?')) return;
  groups.length = 0; blocked = 0;
  resetOverlay();
  updateStats(); renderTable();
}

// ══ 중복 모달 ══
function showDup(code) {
  document.getElementById('dup-code').textContent = code;
  document.getElementById('dup-ov').classList.add('open');
}
function closeDup() {
  document.getElementById('dup-ov').classList.remove('open');
}

// ══ XLSX 내보내기 (모델별 열 배치) ══
function buildXLSXData() {
  // 모델명 목록 (등장 순서 유지, 중복 제거)
  const models = [...new Set(groups.map(g => g.model).filter(Boolean))];

  // 모델별 S/N 배열 수집
  const modelSNs = {};
  models.forEach(m => { modelSNs[m] = []; });
  groups.forEach(g => {
    if (g.model && g.serial) modelSNs[g.model].push(g.serial);
  });

  // 최대 행 수
  const maxRows = Math.max(...models.map(m => modelSNs[m].length));

  // 헤더: 빈칸, 모델명1, 모델명2, ...
  const header = ['', ...models];
  const rows = [header];

  // 데이터: 번호, 각 모델의 i번째 S/N
  for (let i = 0; i < maxRows; i++) {
    const row = [i + 1];
    models.forEach(m => {
      row.push(modelSNs[m][i] || '');
    });
    rows.push(row);
  }
  return {rows, models};
}

function dlXLSX() {
  if (!groups.length) { showToast('스캔된 항목이 없습니다'); return; }
  if (typeof XLSX === 'undefined') { showToast('엑셀 라이브러리 로딩 중...'); return; }

  const {rows, models} = buildXLSXData();
  const ws = XLSX.utils.aoa_to_sheet(rows);

  // 컬럼 너비: 번호 6, 모델별 16
  ws['!cols'] = [{wch:6}, ...models.map(() => ({wch:18}))];

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '출하목록');
  const d = new Date();
  const fn = `출하목록_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.xlsx`;
  XLSX.writeFile(wb, fn);
  showToast('엑셀 저장: ' + fn);
}

function toCSV() {
  const {rows} = buildXLSXData();
  return rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
}
function dlCSV() {
  if (!groups.length) { showToast('스캔된 항목이 없습니다'); return; }
  const d = new Date();
  const fn = `출하목록_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.csv`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+toCSV()], {type:'text/csv;charset=utf-8;'}));
  a.download = fn; a.click(); URL.revokeObjectURL(a.href);
  showToast('CSV 저장: ' + fn);
}

function toEmailText() {
  // 메일 본문용 — 탭 구분으로 피벗 구조 유지
  const {rows} = buildXLSXData();
  return rows.map(r => r.join('\t')).join('\n');
}

function sendEmail() {
  if (!groups.length) { showToast('스캔된 항목이 없습니다'); return; }
  const to   = document.getElementById('eto').value.trim();
  const subj = document.getElementById('esubj').value.trim();
  const note = document.getElementById('enote').value.trim();

  // 엑셀 파일 먼저 다운로드 후 메일 앱 열기
  if (typeof XLSX !== 'undefined') {
    dlXLSX();
    setTimeout(() => {
      const body = (note ? note + '\n\n' : '') +
        '[엑셀 파일이 자동으로 다운로드되었습니다. 첨부 후 발송해주세요]\n\n' +
        '=== 출하 목록 ===\n' + toEmailText();
      window.location.href = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
    }, 600);
  } else {
    const body = (note ? note + '\n\n' : '') + '=== 출하 목록 ===\n' + toEmailText();
    window.location.href = `mailto:${encodeURIComponent(to)}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
  }
}
async function sendSheets() {
  if (!groups.length) { showToast('스캔된 항목이 없습니다'); return; }
  const url = document.getElementById('surl').value.trim();
  if (!url) { showToast('URL을 입력해주세요'); return; }
  showToast('전송 중...');
  try {
    await fetch(url, {method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({groups, exportedAt:new Date().toISOString()})});
    showToast('전송 완료!');
  } catch(e) { showToast('전송 실패'); }
}

// ══ 토스트 ══
let _tt;
function showToast(m) {
  const el = document.getElementById('toast');
  el.textContent = m; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3000);
}
document.getElementById('min').addEventListener('keydown', e => { if (e.key==='Enter') addManual(); });

// ══ 시작 ══
function waitAndInit() {
  if (typeof ZXingBrowser !== 'undefined' || window._zxingBundleLoaded) { initEngine(); }
  else if (window._zxingLoaded === false) { initEngine(); }
  else { setTimeout(waitAndInit, 150); }
}
if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', waitAndInit);
else waitAndInit();
</script>
