name: Bundle ZXing & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ZXing
        run: npm install @zxing/browser@0.1.4

      - name: Build zxing-bundle.js with safe wrapper
        run: |
          ZXING_FILE=$(find node_modules/@zxing -name "*.min.js" | head -1)
          if [ -z "$ZXING_FILE" ]; then
            ZXING_FILE=$(find node_modules/@zxing -name "index.js" | grep umd | head -1)
          fi
          echo "파일: $ZXING_FILE"

          # 실제 전역변수명 확인
          VARNAME=$(grep -o '"ZXing[A-Za-z]*"' "$ZXING_FILE" | head -1 | tr -d '"')
          echo "감지된 변수명: $VARNAME"

          # zxing-bundle.js 생성 — ZXingBrowser 로 통일되도록 래퍼 추가
          cat > zxing-bundle.js << 'WRAPPER_START'
(function(){
WRAPPER_START

          cat "$ZXING_FILE" >> zxing-bundle.js

          cat >> zxing-bundle.js << 'WRAPPER_END'

// 전역변수 통일: ZXingBrowser 로 노출
if(typeof ZXingBrowser === 'undefined'){
  if(typeof ZXingLibrary !== 'undefined') window.ZXingBrowser = ZXingLibrary;
  else if(typeof __ZXing__ !== 'undefined') window.ZXingBrowser = __ZXing__;
  else {
    // UMD exports 를 직접 탐색
    var keys = Object.keys(window).filter(function(k){
      return k.toLowerCase().indexOf('zxing') >= 0;
    });
    if(keys.length > 0) window.ZXingBrowser = window[keys[0]];
  }
}
window._zxingBundleLoaded = true;
console.log('zxing-bundle.js loaded. ZXingBrowser:', typeof ZXingBrowser);
})();
WRAPPER_END

          echo "완료: $(wc -c < zxing-bundle.js) bytes"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,node_modules,package*.json'
