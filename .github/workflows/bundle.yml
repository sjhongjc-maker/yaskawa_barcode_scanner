name: Bundle ZXing & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install ZXing and check files
        run: |
          npm install @zxing/browser@0.1.4
          echo "=== 설치된 파일 목록 ==="
          find node_modules/@zxing -name "*.js" | head -30

      - name: Bundle ZXing into HTML
        run: |
          # umd 파일 찾아서 복사
          ZXING_FILE=$(find node_modules/@zxing -name "*.min.js" | head -1)
          if [ -z "$ZXING_FILE" ]; then
            ZXING_FILE=$(find node_modules/@zxing -name "index.js" | head -1)
          fi
          echo "사용할 파일: $ZXING_FILE"
          cp "$ZXING_FILE" zxing-bundle.js
          echo "Done: $(wc -c < zxing-bundle.js) bytes"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,node_modules,package*.json'
